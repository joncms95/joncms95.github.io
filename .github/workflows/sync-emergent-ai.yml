name: Sync Emergent AI build

on:
  push:
    branches: [main]
    paths:
      - "emergent-ai-source"
      - ".gitmodules"
      - ".github/workflows/sync-emergent-ai.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-emergent-ai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: emergent-ai-source/yarn.lock

      - name: Install and build
        working-directory: emergent-ai-source
        env:
          CI: "false"
          GENERATE_SOURCEMAP: "false"
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Copy build to emergent-ai/
        run: |
          rm -rf emergent-ai
          mkdir -p emergent-ai
          cp -a emergent-ai-source/build/. emergent-ai/

      - name: Commit Pages output if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emergent-ai
          if git diff --staged --quiet; then
            echo "No changes under emergent-ai/"
          else
            git commit -m "chore: sync emergent-ai build from emergent-ai-source submodule"
            git push
          fi
